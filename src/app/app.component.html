<ion-app>
  @if (showMenu()) {
    <ion-menu contentId="main-content" menuId="main-menu" type="overlay">
      <ion-header>
        <ion-toolbar>
          <ion-title>{{ 'menu.title' | translate }}</ion-title>
        </ion-toolbar>
      </ion-header>
      <ion-content>
        <ion-list inset="true">
          <ion-list-header>{{ 'menu.navigate' | translate }}</ion-list-header>
          <ion-menu-toggle auto-hide="true">
            @for (item of menuItems; track item.url) {
              <ion-item
                button="true"
                [routerLink]="item.url"
                routerLinkActive="selected"
                [routerLinkActiveOptions]="{ exact: true }"
              >
                <ion-label>{{ item.titleKey | translate }}</ion-label>
              </ion-item>
            }
          </ion-menu-toggle>
        </ion-list>

        <ion-list inset="true">
          <ion-menu-toggle auto-hide="true">
            <ion-item button="true" (click)="logout()">
              <ion-label>{{ 'menu.logout' | translate }}</ion-label>
            </ion-item>
          </ion-menu-toggle>
        </ion-list>
      </ion-content>
    </ion-menu>
  }

  <ion-router-outlet id="main-content"></ion-router-outlet>
</ion-app>
